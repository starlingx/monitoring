---
- project:
    templates:
      - stx-bandit-jobs
    check:
      jobs:
        - starlingx-common-tox-linters
        - kube-cpusets-tox-py39
        - kube-cpusets-tox-flake8
        - kube-cpusets-tox-pylint
        - kube-memory-tox-py39
        - kube-memory-tox-flake8
        - kube-memory-tox-pylint
        - collectd-extensions-py39
    gate:
      jobs:
        - starlingx-common-tox-linters
        - kube-cpusets-tox-py39
        - kube-cpusets-tox-flake8
        - kube-cpusets-tox-pylint
        - kube-memory-tox-py39
        - kube-memory-tox-flake8
        - kube-memory-tox-pylint
        - collectd-extensions-py39
    post:
      jobs:
        - stx-monitoring-upload-git-mirror

- job:
    name: stx-monitoring-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/monitoring to
      github.com/starlingx/monitoring
    vars:
      git_mirror_repository: starlingx/monitoring
    secrets:
      - name: git_mirror_credentials
        secret: stx-monitoring-github-secret3
        pass-to-parent: true

- job:
    name: kube-cpusets-tox-pylint
    parent: tox
    description: |
      Run pylint test for kube-cpusets
    required-projects:
      - starlingx/config
    nodeset: debian-bullseye
    files:
      - kube-cpusets/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c kube-cpusets/kube-cpusets/tox.ini

- job:
    name: kube-cpusets-tox-flake8
    parent: tox
    description: |
      Run flake8 test for kube-cpusets
    required-projects:
      - starlingx/config
    nodeset: debian-bullseye
    files:
      - kube-cpusets/kube-cpusets/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c kube-cpusets/kube-cpusets/tox.ini

- job:
    name: kube-cpusets-tox-py39
    parent: tox
    description: |
      Run py39 for kube-cpusets
    required-projects:
      - starlingx/config
    nodeset: debian-bullseye
    files:
      - kube-cpusets/kube-cpusets/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c kube-cpusets/kube-cpusets/tox.ini

- job:
    name: kube-memory-tox-pylint
    parent: tox
    required-projects:
      - starlingx/config
    nodeset: debian-bullseye
    description: |
      Run pylint test for kube-memory
    files:
      - kube-memory/kube-memory/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c kube-memory/kube-memory/tox.ini

- job:
    name: kube-memory-tox-flake8
    parent: tox
    description: |
      Run flake8 test for kube-memory
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
    files:
      - kube-memory/kube-memory/*
    vars:
      tox_envlist: flake8
      tox_extra_args: -c kube-memory/kube-memory/tox.ini

- job:
    name: kube-memory-tox-py39
    parent: tox
    description: |
      Run py39 test for kube-memory
    nodeset: debian-bullseye
    required-projects:
      - starlingx/config
    files:
      - kube-memory/kube-memory/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c kube-memory/kube-memory/tox.ini

- job:
    name: collectd-extensions-py39
    parent: tox
    description: |
      Run py39 for collectd-extensions
    required-projects:
      - starlingx/config
    nodeset: debian-bullseye
    files:
      - collectd-extensions/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c collectd-extensions/tox.ini

