[global]
##
## Default Data Set
##
boundary_clock_jbod 1
clock_servo linreg
delay_mechanism E2E
message_tag ptsptp1
network_transport L2
summary_interval 6
time_stamping hardware
tx_timestamp_timeout 20
uds_address /var/run/ptp4l-ptsptp1




[unicast_master_table]
##
## Associated with section: unicast_master_table_1
##
table_id 1
logQueryInterval -1
peer_address ::1
UDPv4 1.1.1.1
UDPv4 2.2.2.2
UDPv4 3.3.3.3


[unicast_master_table]
##
## Associated with section: unicast_master_table_2
##
table_id 2
logQueryInterval 1
peer_address 1.2.3.4
UDPv6 ::1
UDPv6 ::2
UDPv6 ::3


[eno4]
##
## Associated interface: eno4
##
unicast_master_table 1

[eno8]
##
## Associated interface: eno8
##
unicast_master_table 2